<main class="min-h-screen bg-slate-100 py-10 px-4">
  <section class="mx-auto max-w-2xl rounded-lg bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <h1 class="text-2xl font-semibold text-slate-900">Student Data Generation</h1>
    <p class="mt-2 text-sm text-slate-600">
      Generate an Excel file with student records. Supports up to 1000000 records.
    </p>

    <form class="mt-6 space-y-4" (submit)="$event.preventDefault(); generateExcel()">
      <div>
        <label for="records" class="mb-1 block text-sm font-medium text-slate-700">
          Number of records
        </label>
        <input
          id="records"
          type="number"
          min="1"
          max="1000000"
          step="1"
          [value]="records"
          (input)="records = +$any($event.target).value"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 outline-none ring-indigo-200 focus:ring-2"
        />
      </div>

      <button
        type="submit"
        [disabled]="isGenerating"
        class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-indigo-500 disabled:cursor-not-allowed disabled:bg-indigo-300"
      >
        {{ isGenerating ? 'Generating...' : 'Generate Excel' }}
      </button>
    </form>

    @if (successMessage) {
      <div class="mt-4 rounded-md border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">
        {{ successMessage }}
      </div>
    }

    @if (errorMessage) {
      <div class="mt-4 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
        {{ errorMessage }}
      </div>
    }
  </section>
</main>
